<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Area Detail - Nature Explorer Songkhla</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="page-header">
      <span class="step-number">3</span>
      <p class="eyebrow">Exploration site</p>
      <h1>Enter National Park Area</h1>
    </header>

    <nav class="app-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="map.html">Station</a>
      <a href="naturedex.html">NatureDex</a>
      <a href="records.html">Records</a>
    </nav>

    <main class="page-main">
      <section class="panel page-panel" aria-labelledby="areaTitle">
        <span class="step-number">3</span>
        <h2 id="areaTitle">Area Detail</h2>
        <div id="areaDetail" class="area-detail"></div>
        <button id="checkInButton" type="button">Check In</button>
        <div id="checkInStatus" class="status-message">Choose a site before checking in.</div>
        <h3>Species at this station</h3>
        <div id="speciesList" class="species-grid" aria-label="Station species cards"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
